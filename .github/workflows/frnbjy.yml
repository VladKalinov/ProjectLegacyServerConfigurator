name: Android Build frnbjy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 30
          build-tools: 30.0.3
          ndk-version: 26.1.10909125
          
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Install Gradle 7.2
        run: |
          wget https://services.gradle.org/distributions/gradle-7.2-bin.zip -O gradle-7.2-bin.zip
          unzip gradle-7.2-bin.zip -d /tmp
          echo "/tmp/gradle-7.2/bin" >> $GITHUB_PATH
        
      - name: Validate Gradle
        run: gradle --version
        
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        
      - name: Build Release APK
        run: gradle assembleRelease --stacktrace
        
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5
          
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 5
          
      - name: Build Log
        if: failure()
        run: |
          echo "=== Build failed. Check logs above ===" 
          find . -name "*.log" -type f -exec cat {} \;
